name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

# Cancel in-progress runs for the same branch
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # Detect which areas have changed
  detect-changes:
    runs-on: ubuntu-latest
    outputs:
      services: ${{ steps.filter.outputs.services }}
      web: ${{ steps.filter.outputs.web }}
      shared: ${{ steps.filter.outputs.shared }}
    steps:
      - uses: actions/checkout@v4
      - uses: dorny/paths-filter@v3
        id: filter
        with:
          filters: |
            services:
              - 'services/**'
              - 'pants.toml'
              - 'BUILD'
            web:
              - 'web/**'
            shared:
              - 'shared/**'

  # Backend services (Go + Python) with Pants
  services:
    needs: detect-changes
    if: needs.detect-changes.outputs.services == 'true' || needs.detect-changes.outputs.shared == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0  # Full history for Pants change detection

      - name: Set up Pants
        uses: pantsbuild/actions/init-pants@v8
        with:
          gha-cache-key: pants-cache-${{ runner.os }}
          named-caches-hash: ${{ hashFiles('pants.toml', '**/BUILD') }}

      - name: Check (lint + typecheck)
        run: |
          pants lint services/:: shared/::
          pants check services/python/::

      - name: Test
        run: pants test services/::

      - name: Package
        run: pants package services/go/gateway:gateway services/go/detection:detection

  # Web apps with Turborepo
  web:
    needs: detect-changes
    if: needs.detect-changes.outputs.web == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v2
        with:
          version: 9

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'pnpm'
          cache-dependency-path: web/pnpm-lock.yaml

      - name: Install dependencies
        run: cd web && pnpm install --frozen-lockfile

      - name: Lint
        run: cd web && pnpm turbo run lint

      - name: Type check
        run: cd web && pnpm turbo run check-types

      - name: Build
        run: cd web && pnpm turbo run build

  # Docker images (only on main branch push)
  docker:
    needs: [services]
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Pants
        uses: pantsbuild/actions/init-pants@v8
        with:
          gha-cache-key: pants-cache-${{ runner.os }}
          named-caches-hash: ${{ hashFiles('pants.toml', '**/BUILD') }}

      - name: Build Docker images
        run: |
          pants package services/go/gateway:docker
          pants package services/go/detection:docker
          pants package services/python/triage:docker
          pants package services/python/copilot:docker

      # Uncomment to push to registry
      # - name: Login to Container Registry
      #   uses: docker/login-action@v3
